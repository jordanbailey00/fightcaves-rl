[base]
env_name = fight_caves
checkpoint_interval = 50

# v35.1 retrain — replicates v34_sweep_long pick `a3mi6u2g`.
# Picked because: absolute SOTA (peak/final 0.886, stable, 2.03B steps)
# v34 result: peak_jkr=0.886  final_jkr=0.886  last3_mean=0.733  steps=2.03B
# Source: pufferlib_4/wandb/wandb/run-*-a3mi6u2g/files/config.yaml (local sweep cache)
# Generated 2026-05-04. All [env] reward weights match v32.0 baseline (held constant in the v34 sweep).
# Total timesteps fixed at 3e9 (the sweep's per-trial cap) so retrains get full convergence,
# not whatever step Pareto pruning happened to stop the original at.

[env]
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 15.0
w_jad_kill = 2000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.25
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_waste_scale = -1.2
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_unnecessary_prayer_penalty = -0.2
shape_wave_stall_start = 1400
shape_wave_stall_ramp_interval = 150
shape_wave_stall_base_penalty = -0.5
shape_wave_stall_cap = -2.0
shape_resource_threat_window = 2
shape_jad_heal_penalty = -0.3
initial_sharks = 0
initial_prayer_doses = 0
obs_ablate_npc_distance = 0
obs_ablate_incoming_aggregates = 1
obs_ablate_npc_valid = 0

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 3_000_000_000
anneal_lr = 0
learning_rate = 0.0009000000000000007
ent_coef = 0.02423374579539897
gamma = 0.9963272487242703
gae_lambda = 0.96405274026941
clip_coef = 0.17830599245832296
vf_coef = 1
vf_clip_coef = 0.15124043205980495
max_grad_norm = 0.25
horizon = 256
minibatch_size = 4096
replay_ratio = 1.567733336432473
vtrace_rho_clip = 0.5
vtrace_c_clip = 0.5037274754757021
prio_alpha = 0.9682355928752012
prio_beta0 = 0
beta1 = 0.95
beta2 = 0.9995810484472892
eps = 1e-10

[policy]
hidden_size = 256
num_layers = 3

# Single-config training still reads [sweep].metric for the wandb-publish gate
# (pufferl.py:256, 306). default.ini sets metric=score; without this block, the
# gate `target_key not in flat_logs` is True every epoch and wandb.log() is
# never called. Keep this block whenever wandb metrics are wanted.
[sweep]
metric = jad_kill_rate
