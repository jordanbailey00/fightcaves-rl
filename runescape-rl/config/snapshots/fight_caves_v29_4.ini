[base]
env_name = fight_caves
checkpoint_interval = 50
# v29.4: smaller policy net — hidden_size 256 → 192 (−25%, ~41% fewer params).
#
# Tests whether 439K-param 2-layer MinGRU is overkill for Fight Caves.
# 192 hidden at 2 layers is ~260K params. Should train ~15–25% faster
# (fewer matmuls per update), which compounds across every future
# ablation — a small net wins pays back quickly.
#
# Hypothesis: Fight Caves state space is bounded (12 NPCs × 12 features,
# resource counters, wave phase). The 256/2 policy was picked as a
# reasonable-looking default and never varied. A moderate capacity
# cut shouldn't hurt if the original size was overprovisioned.
#
# Outcome interpretation (baseline = v29.0, v28.8-at-seed-7):
#   - peak ≥ v29.0 − 0.05 → 192 is sufficient. Adopt as default;
#     subsequent ablations run 15–25% faster.
#   - peak drops 0.10+ → capacity matters. Stay at 256.
#   - peak drops 0.05–0.10 → judgment call based on SPS gain actually
#     observed.
#
# Single-variable change from v28.8: hidden_size 256 → 192. Layer
# count unchanged. This is pure optimization, not diagnostic — run
# last; skip if earlier ablations materially shifted the baseline.

[env]
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 15.0
w_jad_kill = 2000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.25
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_full_waste_penalty = -6.5
shape_food_waste_scale = -1.2
shape_pot_full_waste_penalty = -6.5
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_unnecessary_prayer_penalty = -0.2
shape_wave_stall_start = 1400
shape_wave_stall_ramp_interval = 150
shape_wave_stall_base_penalty = -0.5
shape_wave_stall_cap = -2.0
shape_resource_threat_window = 2

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 3_000_000_000
learning_rate = 0.0003
anneal_lr = 0
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.2
vf_coef = 0.5
ent_coef = 0.01
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096

[policy]
# v29.4 knob change — reduced hidden size (was 256); ~41% param cut
hidden_size = 192
num_layers = 2

[sweep]
metric = jad_kill_rate
