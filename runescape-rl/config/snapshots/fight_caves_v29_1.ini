[base]
env_name = fight_caves
checkpoint_interval = 50
# v29.1: disable prioritized experience replay — v28.8 config + prio_alpha=0.
#
# With prio_alpha=0, three things collapse in torch_pufferl.py:
#   1. Line 287: prio_weights = adv**0 = all ones (uniform sampling)
#   2. Line 288: prio_probs uniform → torch.multinomial samples uniformly
#   3. Line 258: anneal_beta = b0 + (1-b0)*0*(...) = b0 (constant, no annealing)
#   4. Line 291: mb_prio = (N * 1/N)**-b0 = 1 (IS correction is a no-op)
# Net effect: vanilla PPO with replay buffer. Zero nondeterministic
# coupling between total_timesteps and training dynamics via PER.
#
# This is the highest-information run in the v29.x sweep because it
# directly tests whether PER contributed to v28.7 and v28.10's
# budget-dependent collapses. If peak stays within ±0.05 of v29.0
# (v28.8-at-seed-7 baseline), the entire PER subsystem is unneeded
# and can be deleted.
#
# Single-variable change from v28.8: add prio_alpha=0 (was default 0.8).

[env]
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 15.0
w_jad_kill = 2000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.25
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_full_waste_penalty = -6.5
shape_food_waste_scale = -1.2
shape_pot_full_waste_penalty = -6.5
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_unnecessary_prayer_penalty = -0.2
shape_wave_stall_start = 1400
shape_wave_stall_ramp_interval = 150
shape_wave_stall_base_penalty = -0.5
shape_wave_stall_cap = -2.0
shape_resource_threat_window = 2

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 3_000_000_000
learning_rate = 0.0003
anneal_lr = 0
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.2
vf_coef = 0.5
ent_coef = 0.01
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096
# v29.1 knob change — disable PER (was default 0.8)
prio_alpha = 0

[policy]
hidden_size = 256
num_layers = 2

[sweep]
metric = jad_kill_rate
