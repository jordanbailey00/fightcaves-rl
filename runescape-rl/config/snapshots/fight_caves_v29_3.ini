[base]
env_name = fight_caves
checkpoint_interval = 50
# v29.3: enable LR annealing — anneal_lr 0 → 1, min_lr_ratio = 0.1.
#
# Currently learning_rate is flat at 3e-4 for the entire run. Enabling
# anneal_lr activates cosine decay in torch_pufferl.py:262-266:
#   lr = lr_min + 0.5*(lr - lr_min) * (1 + cos(pi * epoch/total_epochs))
# With min_lr_ratio=0.1, LR decays smoothly from 3e-4 → 3e-5 over
# the run. Late-training updates become effectively a fine-tune.
#
# Hypothesis: the post-peak drift we've seen in every v28 run
# (stability 0.19–0.55) is a flat-LR artifact. LR annealing is the
# standard PPO stability recipe and v27 flagged it as "untested,
# probably helps" — never ran. Testing it here.
#
# Outcome interpretation (baseline = v29.0, v28.8 stability=0.29):
#   - peak ~v29.0 AND stability > 0.45 → LR anneal recovers the
#     late-training stability we've been losing. Adopt as default.
#   - peak drops → annealer kills learning signal before policy
#     finishes developing. Flat LR was right.
#   - peak flat AND stability flat → LR isn't the lever driving drift.
#
# Note: LR annealing also ties behavior to total_timesteps (the
# cosine schedule uses epoch/total_epochs), same as PER's β schedule.
# If v29.1 shows PER is unneeded AND v29.3 shows LR anneal helps,
# LR anneal becomes the ONLY budget-linked schedule in the stack —
# much easier to reason about.
#
# Single-variable change from v28.8: anneal_lr 0 → 1 (with
# min_lr_ratio=0.1 added as the required second parameter).

[env]
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 15.0
w_jad_kill = 2000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.25
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_full_waste_penalty = -6.5
shape_food_waste_scale = -1.2
shape_pot_full_waste_penalty = -6.5
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_unnecessary_prayer_penalty = -0.2
shape_wave_stall_start = 1400
shape_wave_stall_ramp_interval = 150
shape_wave_stall_base_penalty = -0.5
shape_wave_stall_cap = -2.0
shape_resource_threat_window = 2

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 3_000_000_000
learning_rate = 0.0003
# v29.3 knob change — enable cosine LR anneal to 10% of initial
anneal_lr = 1
min_lr_ratio = 0.1
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.2
vf_coef = 0.5
ent_coef = 0.01
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096

[policy]
hidden_size = 256
num_layers = 2

[sweep]
metric = jad_kill_rate
