[base]
env_name = fight_caves
checkpoint_interval = 50
# v29.2: lower entropy bonus — ent_coef 0.01 → 0.005.
#
# v28.10's failure mode was "policy never committed" — entropy stayed
# at 3.8+ for the first 1.75B steps while v28.8/v28.9 dropped to
# ~1.9 by 1.0B (at same seed, same reward config). The entropy bonus
# in PPO's loss is `-ent_coef * entropy`, so halving ent_coef halves
# the pressure keeping the policy broad.
#
# Hypothesis: ent_coef=0.01 was too high and delayed commitment.
# Lowering to 0.005 should let the policy converge earlier and hold
# its peak longer.
#
# Outcome interpretation (baseline = v29.0, v28.8-at-seed-7):
#   - peak ≥ v29.0 AND entropy drops faster in buckets [0.5, 1.5B) → win
#   - peak ≤ v29.0 AND entropy drops too fast → premature commitment,
#     0.01 was right
#   - peak flat AND entropy trajectory unchanged → ent_coef isn't the
#     lever; commitment is driven by something else (likely PER's
#     replay mixture, which v29.1 tests)
#
# Single-variable change from v28.8: ent_coef 0.01 → 0.005.

[env]
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 15.0
w_jad_kill = 2000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.25
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_full_waste_penalty = -6.5
shape_food_waste_scale = -1.2
shape_pot_full_waste_penalty = -6.5
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_unnecessary_prayer_penalty = -0.2
shape_wave_stall_start = 1400
shape_wave_stall_ramp_interval = 150
shape_wave_stall_base_penalty = -0.5
shape_wave_stall_cap = -2.0
shape_resource_threat_window = 2

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 3_000_000_000
learning_rate = 0.0003
anneal_lr = 0
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.2
vf_coef = 0.5
# v29.2 knob change — halved entropy bonus (was 0.01)
ent_coef = 0.005
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096

[policy]
hidden_size = 256
num_layers = 2

[sweep]
metric = jad_kill_rate
