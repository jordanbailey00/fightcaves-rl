[base]
env_name = fight_caves
checkpoint_interval = 50
# v30.0 — v28.8 baseline with both full-waste reward keys removed entirely.
#
# v28.8 Sweep 1 + initial v30.0 run (k27sckzi) showed both
# shape_food_full_waste_penalty and shape_pot_full_waste_penalty were
# byte-identical to v28.8 when zeroed. Backend audit traced the cause:
# the eat/drink actions are pre-filtered at three layers (action mask,
# invalid-action detection, eat/drink handler short-circuit) so the
# `pre_hp >= max_hp` / `pre_prayer >= max_prayer` branches in
# fc_reward.h were architecturally unreachable since the action mask
# was first wired up. The keys carried zero signal, never fired once.
#
# Both keys + their backend struct fields, defaults, kwargs reads, and
# reward-function branches have now been removed. This rerun confirms
# the cleanup didn't perturb anything: expected to match the original
# v30.0 / v28.8 numbers byte-identically.

[env]
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 15.0
w_jad_kill = 2000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.25
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_waste_scale = -1.2
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_unnecessary_prayer_penalty = -0.2
shape_wave_stall_start = 1400
shape_wave_stall_ramp_interval = 150
shape_wave_stall_base_penalty = -0.5
shape_wave_stall_cap = -2.0
shape_resource_threat_window = 2

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 3_000_000_000
learning_rate = 0.0003
anneal_lr = 0
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.2
vf_coef = 0.5
ent_coef = 0.01
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096

[policy]
hidden_size = 256
num_layers = 2

[sweep]
metric = jad_kill_rate
