[base]
env_name = fight_caves
checkpoint_interval = 50
# v29.0: noise-floor probe — v28.8 config + seed=7 (was default 42).
# Tests reproducibility of v28.8's results (peak=0.591, best-250M=0.316,
# stability=0.29, final reach63=0.973). v28.8 is deployment SOTA and
# the most stable baseline we have; every subsequent v29.x ablation
# is a single-knob delta from this config.
#
# Outcome interpretation (baseline = v28.8 at seed=42):
#   - peak 0.52–0.66 AND best-250M 0.28–0.35 AND reach63 ≥ 0.90
#     → v28.8 recipe is robust; ablation deltas trustworthy at ±0.05.
#   - peak 0.30–0.52 OR best-250M < 0.25 → high seed variance; need
#     averaging before drawing conclusions from single-seed ablations.
#   - peak < 0.30 → v28.8's 0.591 was a lucky draw; re-examine the
#     whole training stack before more env sweeps.
#
# Single-variable change from v28.8: seed 42 → 7. All other knobs
# match v28.8 exactly (reward config = v28.4, budget = 3.0B).

[env]
# v28.4 reward config (unchanged across all v29.x ablations).
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 15.0
w_jad_kill = 2000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.25
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_full_waste_penalty = -6.5
shape_food_waste_scale = -1.2
shape_pot_full_waste_penalty = -6.5
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_unnecessary_prayer_penalty = -0.2
shape_wave_stall_start = 1400
shape_wave_stall_ramp_interval = 150
shape_wave_stall_base_penalty = -0.5
shape_wave_stall_cap = -2.0
shape_resource_threat_window = 2

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 3_000_000_000
learning_rate = 0.0003
anneal_lr = 0
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.2
vf_coef = 0.5
ent_coef = 0.01
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096
# v29.0 knob change — different seed from v28.8 (which used default 42)
seed = 7

[policy]
hidden_size = 256
num_layers = 2

[sweep]
metric = jad_kill_rate
