[base]
env_name = fight_caves
checkpoint_interval = 50
# v27.2 rerun (with rwd_* analytics): danger_prayer collapse (break-even 89.6%)
# to break even against wrong_prayer_penalty=-0.3. Agent couldn't bootstrap — abandoned
# prayer switching entirely (2/ep), never used Protect Melee, died wave 49-57.
# v27.3 bumps to 0.15 — Goldilocks zone: break-even 66.7% (easy to bootstrap), but
# well above farming threshold (v27 at 50% farmed).
#
# Everything else matches v27.2: w_correct_jad_prayer=1.5, w_wave_clear=50, w_jad_kill=3000,
# damage_dealt + hits_landed formula, Jad/danger mutex, melee extension on danger_prayer.
# See docs/run_history.md v27.3 entry for full rationale.

[env]
# v27.3 base config (cold start)
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 50.0
w_jad_kill = 3000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.035
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_full_waste_penalty = -6.5
shape_food_waste_scale = -1.2
shape_pot_full_waste_penalty = -6.5
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_wave_stall_start = 500
shape_wave_stall_base_penalty = -0.5
shape_wave_stall_ramp_interval = 50
shape_wave_stall_cap = -2.0
shape_not_attacking_grace_ticks = 2
shape_not_attacking_penalty = -0.01
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_resource_threat_window = 2

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 3_500_000_000
learning_rate = 0.0003
anneal_lr = 0
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.2
vf_coef = 0.5
ent_coef = 0.01
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096

[policy]
hidden_size = 256
num_layers = 2

[sweep]
# Minimal sweep metadata so pufferl.py's target_key lookup succeeds
# and wandb logging fires. v27 is a single-config train run, not a sweep.
metric = jad_kill_rate
