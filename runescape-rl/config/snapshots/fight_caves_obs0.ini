[base]
env_name = fight_caves
checkpoint_interval = 50
# OBS Sweep run 0 — ablate NPC_DISTANCE.
#
# Baseline: v30.0 (== v28.8 reward config, full-waste keys removed).
# Single change vs baseline: obs_ablate_npc_distance = 1.
#
# Zeroes the FC_NPC_DISTANCE field (offset 4 within each NPC stride) for
# all 8 visible NPC slots in the policy obs vector — 8 floats total.
#
# Rationale: distance = chebyshev(player_xy, npc_xy), and the policy
# already gets PLAYER_X/Y and NPC_X/Y. The MinGRU should be able to
# re-derive distance trivially. If this run lands within noise of v28.8,
# NPC_DISTANCE is a safe permanent cut.

[env]
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 15.0
w_jad_kill = 2000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.25
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_waste_scale = -1.2
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_unnecessary_prayer_penalty = -0.2
shape_wave_stall_start = 1400
shape_wave_stall_ramp_interval = 150
shape_wave_stall_base_penalty = -0.5
shape_wave_stall_cap = -2.0
shape_resource_threat_window = 2
obs_ablate_npc_distance = 1
obs_ablate_incoming_aggregates = 0
obs_ablate_npc_valid = 0

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 3_000_000_000
learning_rate = 0.0003
anneal_lr = 0
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.2
vf_coef = 0.5
ent_coef = 0.01
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096

[policy]
hidden_size = 256
num_layers = 2

[sweep]
metric = jad_kill_rate
