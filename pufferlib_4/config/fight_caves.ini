[base]
env_name = fight_caves
checkpoint_interval = 50
# v32.0 — obs.1 reproduction baseline + Jad-heal penalty.
#
# Single change vs obs.1 repro (5qfm1zbj, peak jad_kill 0.702 @ 1.22B):
#   shape_jad_heal_penalty = -0.3   (was 0.0 / absent in obs.1)
#
# Why: behavioral analysis of the obs.1 build showed the policy never
# attacks Yt-HurKot healers (they're in the action space, just ignored).
# Without an explicit cost for Jad getting healed, the marginal reward of
# "abandon Jad → kill healer (+3.5 npc_kill) → return to Jad" was weaker
# than "stay on Jad and absorb the heals." This penalty fires per
# heal-proc that successfully restores Jad HP (state.jad_heal_procs_this_tick).
#
# Sizing rationale: 2 healers × 4-tick heal interval = ~0.5 procs/tick peak,
# so expected per-tick cost if heals are uncontested ≈ 0.15. Modest —
# below w_correct_jad_prayer's ~0.19/tick at peak prayer-switch rate, so
# the agent shouldn't abandon prayer to chase healers. If at end of v32 the
# policy still ignores healers, ramp to -0.5 / -0.7 in v32.1.
#
# Everything else (reward weights, hparams, obs ablation flags) is
# byte-identical to the obs.1 build: 122-float policy obs, aggregates
# zeroed via runtime flag (preserves deterministic init flow).

[env]
w_damage_dealt = 0.9
w_damage_taken = -1.9
w_npc_kill = 3.5
w_wave_clear = 15.0
w_jad_kill = 2000.0
w_player_death = -11.0
w_correct_jad_prayer = 1.5
w_correct_danger_prayer = 0.25
w_invalid_action = -0.1
w_tick_penalty = -0.005
shape_food_waste_scale = -1.2
shape_pot_waste_scale = -1.2
shape_wrong_prayer_penalty = -0.3
shape_npc_melee_penalty = -0.8
shape_wasted_attack_penalty = -0.1
shape_kiting_reward = 2.2
shape_kiting_min_dist = 2
shape_kiting_max_dist = 10
shape_safespot_attack_reward = 1.5
shape_unnecessary_prayer_penalty = -0.2
shape_wave_stall_start = 1400
shape_wave_stall_ramp_interval = 150
shape_wave_stall_base_penalty = -0.5
shape_wave_stall_cap = -2.0
shape_resource_threat_window = 2
shape_jad_heal_penalty = -0.3
obs_ablate_npc_distance = 0
obs_ablate_incoming_aggregates = 1
obs_ablate_npc_valid = 0

[vec]
total_agents = 4096
num_buffers = 2

[train]
total_timesteps = 3_000_000_000
learning_rate = 0.0003
anneal_lr = 0
gamma = 0.999
gae_lambda = 0.95
clip_coef = 0.2
vf_coef = 0.5
ent_coef = 0.01
max_grad_norm = 0.5
horizon = 256
minibatch_size = 4096

[policy]
hidden_size = 256
num_layers = 2

[sweep]
metric = jad_kill_rate
